<html lang="pt-BR">

    <meta charset="UTF-8" />

    <style>
      @import url("https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800&family=Orbitron:wght@600;700;800&display=swap");

      :root {
        color-scheme: dark;
        --bg: #080d14;
        --panel: rgba(13, 20, 31, 0.94);
        --panel-2: rgba(19, 29, 43, 0.86);
        --line: rgba(255, 255, 255, 0.12);
        --line-strong: rgba(94, 234, 212, 0.42);
        --text: #f8fbff;
        --muted: #9aa8be;
        --cyan: #5eead4;
        --amber: #f6c453;
        --danger: #fb7185;
        --green: #91e88c;
        font-family: "Open Sans", Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at 16% 8%, rgba(94, 234, 212, 0.17), transparent 28%),
          radial-gradient(circle at 84% 88%, rgba(246, 196, 83, 0.12), transparent 30%),
          linear-gradient(135deg, rgba(5, 10, 18, 0.96), rgba(9, 16, 26, 0.98));
      }

      button,
      input,
      textarea,
      select {
        font: inherit;
      }

      button {
        min-height: 38px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 0 12px;
        background: rgba(255, 255, 255, 0.075);
        color: var(--text);
        font-weight: 800;
        cursor: pointer;
      }

      button:hover {
        border-color: rgba(94, 234, 212, 0.48);
      }

      button.active,
      button.primary {
        border-color: rgba(94, 234, 212, 0.85);
        background: rgba(94, 234, 212, 0.18);
      }

      button.danger {
        border-color: rgba(251, 113, 133, 0.6);
        background: rgba(251, 113, 133, 0.12);
      }

      input,
      textarea,
      select {
        width: 100%;
        min-height: 38px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 8px 10px;
        color: var(--text);
        background: rgba(0, 0, 0, 0.28);
        outline: none;
      }

      textarea {
        min-height: 96px;
        resize: vertical;
      }

      input:focus,
      textarea:focus,
      select:focus {
        border-color: rgba(94, 234, 212, 0.72);
      }

      header,
      main {
        width: min(1560px, calc(100vw - 28px));
        margin: 0 auto;
      }

      header {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: end;
        padding: 22px 0 12px;
      }

      h1,
      h2,
      h3 {
        font-family: Orbitron, "Open Sans", Arial, sans-serif;
        letter-spacing: 0;
      }

      h1 {
        margin: 0;
        font-size: clamp(1.45rem, 3vw, 2.6rem);
      }

      h2 {
        margin: 0;
      }

      h3 {
        margin: 0 0 10px;
        font-size: 1rem;
      }

      p {
        margin: 6px 0 0;
        color: var(--muted);
      }

      .app {
        display: grid;
        grid-template-columns: 248px minmax(0, 1fr);
        gap: 14px;
        padding-bottom: 24px;
      }

      nav,
      .panel,
      .card {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: 0 18px 80px rgba(0, 0, 0, 0.28);
      }

      nav {
        align-self: start;
        display: grid;
        gap: 8px;
        padding: 10px;
        position: sticky;
        top: 10px;
      }

      nav button {
        justify-content: start;
        text-align: left;
      }

      .panel {
        min-height: calc(100vh - 128px);
        padding: 16px;
      }

      .panel-head {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
        margin-bottom: 14px;
      }

      .panel-actions,
      .toolbar,
      .row-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 12px;
      }

      .grid.tight {
        grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      }

      .two-col {
        display: grid;
        grid-template-columns: minmax(280px, 0.8fr) minmax(360px, 1.2fr);
        gap: 14px;
      }

      .three-col {
        display: grid;
        grid-template-columns: minmax(220px, 0.65fr) minmax(280px, 0.85fr) minmax(420px, 1.3fr);
        gap: 14px;
      }

      .card {
        background: var(--panel-2);
        padding: 14px;
        box-shadow: none;
      }

      .field {
        display: grid;
        gap: 6px;
        color: var(--muted);
        font-size: 0.88rem;
        font-weight: 700;
      }

      .field span {
        color: var(--muted);
        font-weight: 700;
      }

      .check {
        display: flex;
        gap: 8px;
        align-items: center;
        color: var(--text);
        font-weight: 800;
      }

      .check input {
        width: auto;
        min-height: auto;
      }

      .muted {
        color: var(--muted);
      }

      .status {
        color: var(--amber);
        min-height: 20px;
        font-weight: 800;
      }

      .list {
        display: grid;
        gap: 10px;
      }

      .row {
        display: grid;
        grid-template-columns: minmax(120px, 0.45fr) minmax(180px, 1fr) auto;
        gap: 10px;
        align-items: center;
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.18);
      }

      .text-row {
        display: grid;
        grid-template-columns: minmax(180px, 0.45fr) minmax(220px, 0.55fr) minmax(260px, 1fr);
        gap: 10px;
        align-items: start;
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.18);
      }

      .text-key {
        color: var(--cyan);
        font-weight: 900;
        overflow-wrap: anywhere;
      }

      .default-text {
        white-space: pre-wrap;
        color: #c7d2e6;
        font-size: 0.86rem;
      }

      .object-list {
        max-height: 680px;
        overflow: auto;
        display: grid;
        gap: 6px;
      }

      .object-list button {
        text-align: left;
        justify-content: start;
      }

      .object-list button small {
        display: block;
        margin-top: 2px;
        color: var(--muted);
        font-size: 0.72rem;
        font-weight: 700;
      }

      .object-group {
        display: grid;
        gap: 6px;
        padding: 8px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.12);
      }

      .object-group h4 {
        margin: 0;
        color: var(--cyan);
        font-family: Orbitron, "Open Sans", Arial, sans-serif;
        font-size: 0.76rem;
      }

      .button-link {
        min-height: 38px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 0 12px;
        color: var(--text);
        background: rgba(255, 255, 255, 0.075);
        font-weight: 800;
        text-decoration: none;
      }

      .preview-card {
        min-height: 300px;
        overflow: hidden;
        position: relative;
      }

      .preview-card canvas {
        display: block;
        width: 100%;
        min-height: 280px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #07111d;
      }

      .preview-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .raw-editor {
        min-height: 560px;
        font-family: Consolas, "Courier New", monospace;
        font-size: 0.86rem;
      }

      .split-input {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
        align-items: end;
      }

      .pill-bar {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin: 10px 0;
      }

      .pill-bar button {
        min-height: 34px;
        font-size: 0.84rem;
      }

      .audio-list {
        display: grid;
        gap: 8px;
      }

      .audio-row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
      }

      .metric {
        display: grid;
        gap: 4px;
        padding: 12px;
        border-radius: 8px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.045);
      }

      .metric strong {
        font-size: 1.35rem;
        color: var(--cyan);
      }

      .map-preview-wrap {
        display: grid;
        grid-template-columns: minmax(320px, 1fr) minmax(320px, 1fr);
        gap: 12px;
      }

      .hide {
        display: none !important;
      }

      @media (max-width: 1100px) {
        .app,
        .two-col,
        .three-col,
        .map-preview-wrap {
          grid-template-columns: 1fr;
        }

        nav {
          position: static;
          grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
        }

        .text-row,
        .row {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div>
        <h1>Void Arena Prebuild Admin</h1>
        <p>Ferramenta fora do jogo final para editar textos, mecanicas, assets, audio e parametros do gerador antes da build.</p>

    <main class="app">

      const DEFAULT_CUSTOM_OBJECTS = [
        { id: 'pedestrian_male', label: 'Pedestre homem', role: 'man', category: 'pedestrians', baseKind: 'pedestrian', previewColor: '#60a5fa' },
        { id: 'pedestrian_female', label: 'Pedestre mulher', role: 'woman', category: 'pedestrians', baseKind: 'pedestrian', previewColor: '#f472b6' },
        { id: 'pedestrian_builder', label: 'Construtor', role: 'builder', category: 'pedestrians', baseKind: 'pedestrian', previewColor: '#facc15' },
        { id: 'pedestrian_police', label: 'Policial', role: 'police', category: 'pedestrians', baseKind: 'pedestrian', previewColor: '#2563eb' },
        { id: 'pedestrian_firefighter', label: 'Bombeiro', role: 'firefighter', category: 'pedestrians', baseKind: 'pedestrian', previewColor: '#ef4444' },
        { id: 'vehicle_sedan', label: 'Sedan', role: 'sedan', category: 'vehicles', baseKind: 'car', previewColor: '#45a7d8', hitbox: { x: 1.62, y: 0.78, z: 3.05 } },

        { id: 'vehicle_fire_truck', label: 'Caminhao de bombeiros', role: 'fireTruck', category: 'vehicles', baseKind: 'emergency', previewColor: '#ef4444', hitbox: { x: 2.12, y: 1.28, z: 4.35 } },

      ];

      const state = {
        section: 'dashboard',
        config: { engine: {}, text: {}, assets: {} },
        meta: { languages: [], objectKinds: [], powerUps: [], events: [], textDefaults: {} },
        textLang: 'pt',
        textCategory: 'menu',
        textSearch: '',
        objectKind: 'car',
        mapSeed: 'VA-PREBUILD',
        mapSize: 'medium',
        rawSection: 'engine'
      };

      const elements = {
        nav: document.querySelector('#nav'),
        title: document.querySelector('#title'),
        subtitle: document.querySelector('#subtitle'),
        content: document.querySelector('#content'),
        status: document.querySelector('#status')
      };

      const gltfLoader = new GLTFLoader();
      let objectPreview = null;
      let mapPreview = null;
      let mapPreviewTimer = 0;
      let mapPreviewRequestId = 0;
      const localModelPreviewUrls = new Map();
      let statusTimer = 0;

      document.querySelector('#save-all').addEventListener('click', () => void saveAll());
      document.querySelector('#reload').addEventListener('click', () => void load());

      renderNav();
      await load();

      async function load() {
        const [configResponse, metaResponse] = await Promise.all([fetch('/api/config'), fetch('/api/meta')]);
        state.config = await configResponse.json();
        state.meta = await metaResponse.json();
        normalizeAllConfig();
        render();
        setStatus('Carregado');
      }

      async function saveAll() {
        if (!commitRawEditor(true)) return;
        await Promise.all([
          saveSection('engine', state.config.engine),
          saveSection('text', state.config.text),
          saveSection('assets', state.config.assets)
        ]);
        setStatus('Tudo salvo. A proxima build usa estes dados.');
      }

      async function saveCurrent() {
        if (!commitRawEditor(true)) return;
        const section = state.section === 'texts'
          ? 'text'
          : state.section === 'objects'
            ? 'assets'
            : state.section === 'raw'
              ? state.rawSection
              : state.section;
        await saveSection(section, sectionPayload());
        setStatus('Secao salva.');
      }

      async function saveSection(section, value) {
        const response = await fetch(`/api/config/${section}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(value)
        });
        if (!response.ok) {
          throw new Error(`Could not save ${section}`);
        }
      }

      function sectionPayload() {
        if (state.section === 'texts') return state.config.text;
        if (state.section === 'objects') return state.config.assets;
        if (state.section === 'audio' || state.section === 'mechanics' || state.section === 'powerups' || state.section === 'events' || state.section === 'generator') return state.config.engine;
        if (state.section === 'raw') return state.config[state.rawSection] ?? state.config.engine;
        return state.config.engine;
      }

        elements.nav.innerHTML = SECTIONS.map(([id, label]) => `<button data-section="${id}" class="${state.section === id ? 'active' : ''}">${label}</button>`).join('');

          button.addEventListener('click', () => {
            if (!commitRawEditor(true)) return;
            state.section = button.dataset.section;
            renderNav();
            render();
          });
        });
      }

      function render() {
        const section = SECTIONS.find(([id]) => id === state.section) ?? SECTIONS[0];
        elements.title.textContent = section[1];
        elements.subtitle.textContent = section[2];
        objectPreview?.dispose?.();
        objectPreview = null;
        mapPreview?.dispose?.();
        mapPreview = null;

        switch (state.section) {
          case 'texts':
            renderTexts();
            break;
          case 'mechanics':
            renderMechanics();
            break;
          case 'powerups':
            renderPowerups();
            break;
          case 'events':
            renderEvents();
            break;
          case 'objects':
            renderObjects();
            break;
          case 'audio':
            renderAudio();
            break;
          case 'generator':
            renderGenerator();
            break;
          case 'raw':
            renderRaw();
            break;
          case 'dashboard':

            renderDashboard();
            break;
        }
      }

      function textRowMarkup(key, value) {
        const defaultValue = state.meta.textDefaults[key] ?? '';
        const control = defaultValue.length > 70 || defaultValue.includes('\n')
          ? `<textarea data-text-key="${key}" rows="3" placeholder="${escapeHtml(defaultValue)}">${escapeHtml(value)}</textarea>`
          : `<input data-text-key="${key}" value="${escapeHtml(value)}" placeholder="${escapeHtml(defaultValue)}" />`;
        return `
          <div class="text-row" data-text-row data-search="${escapeHtml(`${key} ${defaultValue}`.toLowerCase())}">
            <div>
              <div class="text-key">${key}</div>
              <small class="muted">${TEXT_CATEGORIES.find(([id]) => id === categoryForTextKey(key))?.[1] ?? 'Outros'}</small>
            </div>
            <div class="default-text">${escapeHtml(defaultValue)}</div>
            <label class="field">Override ${languageLabel(state.textLang)}
              ${control}
            </label>
          </div>
        `;
      }

      function filteredTextKeys() {
        const keys = Object.keys(state.meta.textDefaults);
        const search = state.textSearch.trim().toLowerCase();
        return keys.filter((key) => {
          const category = categoryForTextKey(key);
          const matchesSearch = !search ||
            key.toLowerCase().includes(search) ||
            String(state.meta.textDefaults[key]).toLowerCase().includes(search);
          const matchesCategory = search ? true : state.textCategory === 'all' || category === state.textCategory;
          return matchesSearch && matchesCategory;
        });
      }

      function renderTextListOnly() {
        const list = elements.content.querySelector('#text-list');

        list.innerHTML = filteredTextKeys().map((key) => textRowMarkup(key, langValues[key] ?? '')).join('');
        bindTextOverrideInputs(list);

            if (input.value === '') {
              delete state.config.text[state.textLang][key];
            } else {
              state.config.text[state.textLang][key] = input.value;
            }
          });
        });
      }

      function renderRaw() {
        const rawValue = state.config[state.rawSection] ?? {};
        elements.content.innerHTML = `
          <div class="pill-bar">
            <button class="${state.rawSection === 'engine' ? 'active' : ''}" data-raw="engine">Engine</button>
            <button class="${state.rawSection === 'text' ? 'active' : ''}" data-raw="text">Textos</button>
            <button class="${state.rawSection === 'assets' ? 'active' : ''}" data-raw="assets">Assets</button>
          </div>
          <textarea id="raw-editor" class="raw-editor" spellcheck="false">${escapeHtml(JSON.stringify(rawValue, null, 2))}</textarea>
          <div class="toolbar" style="margin-top: 12px;">
            <button id="raw-apply" class="primary">Aplicar JSON ao draft</button>
            <button id="raw-save">Salvar secao</button>
          </div>
        `;
        const textarea = elements.content.querySelector('#raw-editor');
        elements.content.querySelectorAll('[data-raw]').forEach((button) => {
          button.addEventListener('click', () => {
            if (!commitRawEditor()) return;
            state.rawSection = button.dataset.raw;
            elements.content.querySelectorAll('[data-raw]').forEach((item) => item.classList.remove('active'));
            button.classList.add('active');
            textarea.value = JSON.stringify(state.config[state.rawSection], null, 2);
          });
        });
        elements.content.querySelector('#raw-apply').addEventListener('click', () => {
          if (commitRawEditor()) {
            renderRaw();
          }
        });
        elements.content.querySelector('#raw-save').addEventListener('click', () => {
          if (commitRawEditor()) {
            void saveSection(state.rawSection, state.config[state.rawSection]).then(() => setStatus('JSON salvo.'));
          }
        });
      }

      function commitRawEditor(silent = false) {
        if (state.section !== 'raw') return true;
        const textarea = elements.content.querySelector('#raw-editor');
        if (!textarea) return true;
        try {
          state.config[state.rawSection] = JSON.parse(textarea.value || '{}');
          normalizeAllConfig();
          if (!silent) {
            setStatus('JSON aplicado ao draft e sincronizado com as telas.');
          }
          return true;
        } catch (error) {
          setStatus(`JSON invalido: ${error.message}`);
          return false;
        }
      }

      function normalizeAllConfig() {
        state.config.engine = mergeDeep(defaultEngineConfig(), state.config.engine ?? {});
        coerceNumericEngineFields();
        state.config.text = state.config.text ?? {};
        for (const lang of state.meta.languages) {
          state.config.text[lang] ??= {};
        }
        state.config.assets = normalizeAssetRegistry(state.config.assets ?? {});
      }

      function defaultEngineConfig() {
        const objectKinds = state.meta.objectKinds;
        return {
          version: 1,
          branding: { title: 'VOID ARENA', menuFont: 'Orbitron', textFont: 'Open Sans' },
          gameplay: {
            startSpeedMultiplier: 2,
            minSpeedMultiplier: 1,
            boostMultiplier: 1.58,
            staminaDrainMultiplier: 1,
            staminaRegenMultiplier: 1,
            magnetStrengthMultiplier: 1,
            objectContactSecondsMultiplier: 1,
            rimSuctionMultiplier: 1,
            swallowGravityMultiplier: 1,
            objectMissForgiveness: 1
          },
          generation: {
            objectDensityMultiplier: 1,
            trafficEnabled: true,
            pedestriansEnabled: true,
            adsEnabled: true,
            enabledObjectKinds: Object.fromEntries(objectKinds.map((kind) => [kind, true])),
            spawnHeightOffsets: Object.fromEntries(objectKinds.map((kind) => [kind, 0])),
            mapTuning: defaultMapTuning()
          },
          powerUps: Object.fromEntries((state.meta.powerUps.length ? state.meta.powerUps : Object.keys(POWERUP_DEFAULTS)).map((type) => [type, {
            enabled: true,
            durationSeconds: POWERUP_DEFAULTS[type] ?? 8
          }])),
          disasters: {
            enabled: true,
            firstDelayMultiplier: 1,
            nextDelayMultiplier: 1,
            events: Object.fromEntries((state.meta.events.length ? state.meta.events : ['rain', 'thunderstorm', 'earthquake', 'meteorShower', 'sandstorm']).map((type) => [type, {
              enabled: true,
              weight: type === 'earthquake' ? 6 : 22
            }]))
          },
          controls: { mouseControlEnabled: true, bindings: {} },
          audio: {
            menuMusic: ['/audio/music/mainmenu1.ogg', '/audio/music/mainmenu2.ogg'],
            mapMusic: ['/audio/music/citymap1.ogg', '/audio/music/citymap2.ogg', '/audio/music/concrete_symphony.ogg'],
            uiHover: '/audio/ui/hover_button.ogg',
            uiClick: '/audio/ui/click_button.ogg',
            playerDie: '/audio/sfx/die_sound.ogg',
            objectSfx: {}
          }
        };
      }

      function defaultMapTuning() {
        return {
          blockSizeMultiplier: 1,
          roadWidthMultiplier: 1,
          avenueCountMultiplier: 1,
          sideStreetMultiplier: 1,
          buildingDensityMultiplier: 1,
          trafficDensityMultiplier: 1,
          pedestrianDensityMultiplier: 1,
          propDensityMultiplier: 1,
          plazaDensityMultiplier: 1,
          adDensityMultiplier: 1,
          powerUpDensityMultiplier: 1
        };
      }

      function normalizeAssetRegistry(input) {
        const registry = mergeDeep({
          version: 1,
          notes: 'Pre-build asset registry. Models, shared texture/material sets, and audio here can be edited before builds.',
          models: {},
          textureSets: {},
          textures: {},
          audio: {},
          customObjectCategories: OBJECT_CATEGORIES.map(({ id, label }) => ({ id, label })),
          customObjects: []
        }, input);
        for (const kind of state.meta.objectKinds) {
          registry.models[kind] = {
            source: '',
            format: 'primitive',
            scale: 1,
            offsetY: 0,
            rotationY: 0,
            collider: 'auto',
            hitbox: { x: objectData(kind).w, y: objectData(kind).h, z: objectData(kind).d },
            materialSet: '',
            atlasRegion: '',
            previewColor: objectData(kind).color,
            lighting: defaultLightingForKind(kind),
            notes: '',
            ...(registry.models[kind] ?? {})
          };
        }
        registry.customObjectCategories = normalizeCustomObjectCategories(registry.customObjectCategories);
        registry.customObjects = normalizeCustomObjects(registry.customObjects);
        return registry;
      }

      function normalizeCustomObjectCategories(categories) {
        const defaults = OBJECT_CATEGORIES.map(({ id, label }) => ({ id, label }));
        const input = Array.isArray(categories) ? categories : [];
        const byId = new Map(defaults.map((category) => [category.id, category]));
        for (const category of input) {
          if (!category?.id) continue;
          byId.set(category.id, { id: slugify(category.id), label: String(category.label || category.id) });
        }
        return [...byId.values()];
      }

      function normalizeCustomObjects(input) {
        const list = Array.isArray(input) ? input : [];
        const normalized = list
          .map((item) => normalizeCustomObject(item))
          .filter(Boolean);
        for (const preset of DEFAULT_CUSTOM_OBJECTS) {
          if (!normalized.some((item) => item.id === preset.id)) {
            normalized.push(normalizeCustomObject(preset));
          }
        }
        return normalized;
      }

      function normalizeCustomObject(item) {
        if (!item || typeof item !== 'object') return null;
        const baseKind = state.meta.objectKinds.includes(item.baseKind) ? item.baseKind : 'pedestrian';
        const data = objectData(baseKind);
        const id = slugify(item.id || item.label || `custom_${Date.now()}`);
        return {
          id,
          label: String(item.label || id),
          enabled: item.enabled !== false,
          category: item.category || categoryForBaseKind(baseKind),
          baseKind,
          role: item.role || '',
          source: item.source || '',
          format: item.format || (String(item.source || '').toLowerCase().endsWith('.gltf') ? 'gltf' : String(item.source || '').toLowerCase().endsWith('.glb') ? 'glb' : 'primitive'),
          scale: finiteOr(item.scale, 1),
          offsetY: finiteOr(item.offsetY, 0),
          rotationY: finiteOr(item.rotationY, 0),
          spawnHeightOffset: finiteOr(item.spawnHeightOffset, 0),
          collider: item.collider || 'auto',
          hitbox: {
            x: finiteOr(item.hitbox?.x, data.w),
            y: finiteOr(item.hitbox?.y, data.h),
            z: finiteOr(item.hitbox?.z, data.d)
          },
          materialSet: item.materialSet || '',
          atlasRegion: item.atlasRegion || '',
          previewColor: item.previewColor || data.color,
          lighting: normalizeLighting(item.lighting, baseKind),
          notes: item.notes || ''
        };
      }

      function defaultLightingForKind(kind) {
        const shape = objectData(kind).shape;
        const enabled = ['building', 'post', 'vehicle', 'ad'].includes(shape);
        return {
          enabled,
          color: kind === 'post' ? '#ffe4a3' : kind === 'emergency' ? '#fff4bc' : '#ffe6a7',
          intensity: enabled ? 1 : 0,
          windowRows: shape === 'building' ? 0 : 0
        };
      }

      function normalizeLighting(input, kind) {
        const defaults = defaultLightingForKind(kind);
        return {
          enabled: input?.enabled ?? defaults.enabled,
          color: input?.color || defaults.color,
          intensity: finiteOr(input?.intensity, defaults.intensity),
          windowRows: Math.max(0, Math.round(finiteOr(input?.windowRows, defaults.windowRows)))
        };
      }

      function createCustomObject(overrides = {}) {
        const baseKind = overrides.baseKind && state.meta.objectKinds.includes(overrides.baseKind) ? overrides.baseKind : 'pedestrian';
        const category = overrides.category || categoryForBaseKind(baseKind);
        const data = objectData(baseKind);
        const label = overrides.label || `Novo ${baseKind}`;
        const id = uniqueCustomObjectId(slugify(overrides.id || label));
        return normalizeCustomObject({
          id,
          label,
          category,
          baseKind,
          previewColor: overrides.previewColor || data.color,
          ...overrides
        });
      }

      function uniqueCustomObjectId(baseId) {
        const existing = new Set((state.config.assets.customObjects ?? []).map((item) => item.id));
        let candidate = baseId || `custom_${Date.now()}`;
        let suffix = 2;
        while (existing.has(candidate)) {
          candidate = `${baseId}_${suffix}`;
          suffix += 1;
        }
        return candidate;
      }

      function coerceNumericEngineFields() {
        const defaults = defaultEngineConfig();
        const paths = [
          'gameplay.startSpeedMultiplier',
          'gameplay.minSpeedMultiplier',
          'gameplay.boostMultiplier',
          'gameplay.staminaDrainMultiplier',
          'gameplay.staminaRegenMultiplier',
          'gameplay.magnetStrengthMultiplier',
          'gameplay.objectContactSecondsMultiplier',
          'gameplay.rimSuctionMultiplier',
          'gameplay.swallowGravityMultiplier',
          'gameplay.objectMissForgiveness',
          'generation.objectDensityMultiplier',
          'disasters.firstDelayMultiplier',
          'disasters.nextDelayMultiplier',
          ...Object.keys(state.config.engine.generation.mapTuning ?? {}).map((key) => `generation.mapTuning.${key}`),
          ...Object.keys(state.config.engine.powerUps ?? {}).map((key) => `powerUps.${key}.durationSeconds`),
          ...Object.keys(state.config.engine.disasters.events ?? {}).map((key) => `disasters.events.${key}.weight`)
        ];
        for (const path of paths) {
          const value = getDeep(state.config.engine, path);
          const parsed = Number(value);
          if (Number.isFinite(parsed)) {
            setDeep(state.config.engine, path, parsed);
          } else {
            setDeep(state.config.engine, path, getDeep(defaults, path) ?? 1);
          }
        }
      }

      function ensureObjectAsset(kind) {
        state.config.assets = normalizeAssetRegistry(state.config.assets);
        const selection = currentObjectSelection();
        if (selection.isCustom) {
          return;
        }
        state.config.engine.generation.enabledObjectKinds[selection.baseKind] ??= true;
        state.config.engine.generation.spawnHeightOffsets[selection.baseKind] ??= 0;
      }

      function currentObjectSelection() {
        const customId = customObjectIdFromKey(state.objectKind);
        if (customId) {
          const customIndex = (state.config.assets.customObjects ?? []).findIndex((item) => item.id === customId);
          if (customIndex >= 0) {
            const model = state.config.assets.customObjects[customIndex];
            const baseKind = state.meta.objectKinds.includes(model.baseKind) ? model.baseKind : 'pedestrian';
            return {
              isCustom: true,
              customIndex,
              key: customObjectKey(model.id),
              assetPath: `customObjects.${customIndex}`,
              model,
              baseKind,
              category: model.category || categoryForBaseKind(baseKind),
              data: modelPreviewData(baseKind, model)
            };
          }
        }

        const baseKind = state.meta.objectKinds.includes(state.objectKind) ? state.objectKind : 'car';
        state.objectKind = baseKind;
        return {
          isCustom: false,
          customIndex: -1,
          key: baseKind,
          assetPath: `models.${baseKind}`,
          model: state.config.assets.models[baseKind],
          baseKind,
          category: categoryForBaseKind(baseKind),
          data: modelPreviewData(baseKind, state.config.assets.models[baseKind])
        };
      }

      function objectListMarkup(activeKey) {
        const customObjects = state.config.assets.customObjects ?? [];
        return OBJECT_CATEGORIES.map((category) => {
          const builtIns = category.builtIns
            .filter((kind) => state.meta.objectKinds.includes(kind))
            .map((item) => `<button class="${item === activeKey ? 'active' : ''}" data-kind="${item}">${item}</button>`)
            .join('');
          const custom = customObjects
            .filter((item) => (item.category || categoryForBaseKind(item.baseKind)) === category.id)
            .map((item) => `<button class="${customObjectKey(item.id) === activeKey ? 'active' : ''}" data-kind="${customObjectKey(item.id)}">${escapeHtml(item.label)}<small>${escapeHtml(item.baseKind)}</small></button>`)
            .join('');
          if (!builtIns && !custom) return '';
          return `
            <div class="object-group">
              <h4>${category.label}</h4>
              ${builtIns}
              ${custom}
            </div>
          `;
        }).join('');
      }

      function customObjectKey(id) {
        return `custom:${id}`;
      }

      function customObjectIdFromKey(key) {
        return String(key ?? '').startsWith('custom:') ? String(key).slice('custom:'.length) : null;
      }

      function categoryForBaseKind(kind) {
        return OBJECT_CATEGORIES.find((category) => category.builtIns.includes(kind))?.id ?? 'items';
      }

      function bindPathInputs(root, target, onChange) {
        root.querySelectorAll('[data-path]').forEach((input) => {
          const write = () => {
            const value = input.type === 'checkbox' ? input.checked : input.type === 'number' ? Number(input.value) : input.value;
            setDeep(target, input.dataset.path, value);
            onChange?.();
          };
          input.addEventListener('input', write);
          input.addEventListener('change', write);
        });
      }

      function bindAssetInputs(root) {
        root.querySelectorAll('[data-asset-path]').forEach((input) => {
          const write = () => {
            const value = input.type === 'checkbox' ? input.checked : input.type === 'number' ? Number(input.value) : input.value;
            setDeep(state.config.assets, input.dataset.assetPath, value);
            if (input.dataset.rerender === 'objects') {
              renderObjects();
              return;
            }
            updateObjectPreview();
            drawSidePreview(document.querySelector('#side-preview'), state.objectKind);
          };
          input.addEventListener('input', write);
          input.addEventListener('change', write);
        });
      }

      function bindAudioLists(root = elements.content) {
        root.querySelectorAll('[data-audio-add]').forEach((button) => {
          button.addEventListener('click', () => {
            const field = button.dataset.audioAdd;
            const input = root.querySelector(`[data-audio-input="${cssEscape(field)}"]`);
            const path = normalizeAudioPath(input?.value ?? '');
            if (!path) {
              setStatus('Use um caminho .ogg ou importe um .mp3 para converter.');
              return;
            }
            getAudioList(field).push(path);
            input.value = '';
            renderAudio();
          });
        });
        root.querySelectorAll('[data-audio-remove]').forEach((button) => {
          button.addEventListener('click', () => {
            const [field, index] = button.dataset.audioRemove.split('|');
            getAudioList(field).splice(Number(index), 1);
            renderAudio();
          });
        });
      }

      function getAudioList(field) {
        if (field.startsWith('objectSfx:')) {
          const kind = field.slice('objectSfx:'.length);
          state.config.engine.audio.objectSfx[kind] ??= [];
          return state.config.engine.audio.objectSfx[kind];
        }
        return state.config.engine.audio[field];
      }

      function audioListMarkup(label, field, list) {
        return `
          <div style="margin-top: 10px;">
            <h3>${label}</h3>
            <div class="audio-list">
              ${(list ?? []).map((path, index) => `
                <div class="audio-row">
                  <input readonly value="${escapeHtml(path)}" />
                  <button class="danger" data-audio-remove="${field}|${index}">Remover</button>
                </div>
              `).join('') || '<p class="muted">Nenhum arquivo ainda.</p>'}
              <div class="audio-row">
                <input data-audio-input="${field}" placeholder="/audio/music/nova_faixa.ogg" />
                <button data-audio-add="${field}">Adicionar</button>
              </div>
            </div>
          </div>
        `;
      }

      async function importAudio() {
        const sourcePath = elements.content.querySelector('#audio-source').value.trim();
        const folder = elements.content.querySelector('#audio-folder').value;
        const target = elements.content.querySelector('#audio-target').value;
        const fileName = elements.content.querySelector('#audio-name').value.trim();
        if (!sourcePath) {
          setStatus('Informe o caminho local do audio.');
          return;
        }
        setStatus('Importando audio...');
        const response = await fetch('/api/import-audio', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sourcePath, folder, fileName })
        });
        const result = await response.json();
        if (!response.ok) {
          setStatus(`Falha: ${result.error ?? 'erro desconhecido'}`);
          return;
        }
        attachAudio(target, result.path);
        await saveSection('engine', state.config.engine);
        setStatus(`Audio importado: ${result.path}`);
        renderAudio();
      }

      async function importModel(pathBase) {
        const sourcePath = elements.content.querySelector('#model-source')?.value.trim();
        const fileName = elements.content.querySelector('#model-name')?.value.trim();
        if (!sourcePath) {
          setStatus('Informe o caminho local do GLB/GLTF.');
          return;
        }
        setStatus('Importando modelo 3D...');
        const response = await fetch('/api/import-model', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sourcePath, fileName })
        });
        const result = await response.json();
        if (!response.ok) {
          setStatus(`Falha: ${result.error ?? 'erro desconhecido'}`);
          return;
        }
        setDeep(state.config.assets, `${pathBase}.source`, result.path);
        setDeep(state.config.assets, `${pathBase}.format`, result.format);
        await saveSection('assets', state.config.assets);
        setStatus(`Modelo importado: ${result.path}`);
        renderObjects();
      }

      function attachAudio(target, path) {
        if (target === 'menuMusic' || target === 'mapMusic') {
          state.config.engine.audio[target].push(path);
          return;
        }
        if (target === 'uiHover' || target === 'uiClick' || target === 'playerDie') {
          state.config.engine.audio[target] = path;
          return;
        }
        if (target.startsWith('object:')) {
          const kind = target.slice('object:'.length);
          state.config.engine.audio.objectSfx[kind] ??= [];
          state.config.engine.audio.objectSfx[kind].push(path);
        }
      }

      function createObjectPreview(canvas) {
        return createThreePreview(canvas, (scene) => {
          const group = new THREE.Group();
          group.name = 'object-root';
          scene.add(group);
          return group;
        });
      }

      function updateObjectPreview() {
        if (!objectPreview) return;
        const group = objectPreview.root;
        group.clear();
        const selection = currentObjectSelection();
        const kind = selection.baseKind;
        const data = selection.data;
        const model = selection.model;
        const source = localModelPreviewUrls.get(selection.key) ?? model.source;
        frameObjectPreview(data, model);
        const addFallback = () => {
          const object = createPrimitiveObject(kind, data, model.previewColor || data.color, model);
          object.position.y = objectSpawnOffset(selection) + (model.offsetY ?? 0);
          object.scale.setScalar(model.scale || 1);
          object.rotation.y = model.rotationY || 0;
          group.add(object);
          objectPreview.renderOnce();
        };
        if (source && (localModelPreviewUrls.has(selection.key) || model.format === 'glb' || model.format === 'gltf')) {
          gltfLoader.load(source, (gltf) => {
            const root = gltf.scene;
            root.position.y = objectSpawnOffset(selection) + (model.offsetY ?? 0);
            root.scale.setScalar(model.scale || 1);
            root.rotation.y = model.rotationY || 0;
            group.add(root);
            objectPreview.renderOnce();
          }, undefined, addFallback);
        } else {
          addFallback();
        }
      }

      function frameObjectPreview(data, model = {}) {
        if (!objectPreview?.camera || !objectPreview?.controls) return;
        const scale = model.scale || 1;
        const maxSize = Math.max(data.w, data.h, data.d) * scale;
        const distance = Math.max(6.5, maxSize * 1.58);
        const targetY = Math.max(0.75, data.h * scale * 0.42);
        objectPreview.camera.position.set(distance, Math.max(4.5, maxSize * 0.9), distance);
        objectPreview.camera.near = 0.05;
        objectPreview.camera.far = Math.max(800, distance * 12);
        objectPreview.camera.updateProjectionMatrix();
        objectPreview.controls.target.set(0, targetY, 0);
      }

      function createMapPreview(canvas) {
        return createThreePreview(canvas, (scene) => {
          const group = new THREE.Group();
          group.name = 'map-root';
          scene.add(group);
          return group;
        }, { cameraPosition: [52, 48, 52] });
      }

      function drawMapPreview() {
        const fallback = generatePreviewMap();
        drawMap2d(document.querySelector('#map-preview-2d'), fallback);
        drawMap3d(fallback);
        window.clearTimeout(mapPreviewTimer);
        mapPreviewTimer = window.setTimeout(() => void drawRealMapPreview(), 260);
      }

      async function drawRealMapPreview() {
        if (state.section !== 'generator') return;
        const requestId = ++mapPreviewRequestId;
        try {
          const generation = state.config.engine.generation;
          const response = await fetch('/api/map-preview', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              seed: state.mapSeed,
              size: state.mapSize,
              enableAds: generation.adsEnabled,
              objectDensityMultiplier: generation.objectDensityMultiplier,
              engineConfig: state.config.engine
            })
          });
          const result = await response.json();
          if (!response.ok || !result.ok) {
            throw new Error(result.error ?? 'Preview failed');
          }
          if (requestId !== mapPreviewRequestId || state.section !== 'generator') return;
          drawMap2d(document.querySelector('#map-preview-2d'), result.map);
          drawMap3d(result.map);
          setStatus(`Preview real: ${result.map.objects.length} objetos, ${result.map.roads.length} ruas, ${result.map.surfaces.length} superficies.`);
        } catch (error) {
          if (requestId === mapPreviewRequestId) {
            setStatus(`Preview real indisponivel: ${error.message}`);
          }
        }
      }

      function generatePreviewMap() {
        const rng = seededRandom(state.mapSeed);
        const sizes = {
          small: { half: 48, roads: 3, block: 24 },
          medium: { half: 78, roads: 5, block: 28 },
          large: { half: 150, roads: 7, block: 34 },
          huge: { half: 235, roads: 9, block: 42 }
        };
        const base = sizes[state.mapSize] ?? sizes.medium;
        const tuning = state.config.engine.generation.mapTuning ?? defaultMapTuning();
        const half = base.half;
        const block = base.block * tuning.blockSizeMultiplier;
        const roadWidth = 7 * tuning.roadWidthMultiplier;
        const roadCount = Math.max(2, Math.round(base.roads * tuning.avenueCountMultiplier));
        const positions = [];
        for (let i = 0; i < roadCount; i += 1) {
          const t = roadCount === 1 ? 0.5 : i / (roadCount - 1);
          positions.push((t - 0.5) * half * 1.48 + (rng() - 0.5) * block * 0.16);
        }
        const roads = [];
        for (const [index, x] of positions.entries()) {
          roads.push({ id: `preview-v-${index}`, x, z: 0, width: roadWidth, length: half * 2.08, rotationY: 0, lanes: roadWidth > 7.6 ? 2 : 1, sidewalkWidth: 2.5 });
        }
        for (const [index, z] of positions.entries()) {
          roads.push({ id: `preview-h-${index}`, x: 0, z, width: roadWidth, length: half * 2.08, rotationY: Math.PI / 2, lanes: roadWidth > 7.6 ? 2 : 1, sidewalkWidth: 2.5 });
        }
        const objects = [];
        const buildingTarget = Math.round(base.roads * base.roads * 1.8 * tuning.buildingDensityMultiplier);
        let attempts = buildingTarget * 8;
        while (objects.length < buildingTarget && attempts-- > 0) {
          const x = (rng() * 2 - 1) * half * 0.86;
          const z = (rng() * 2 - 1) * half * 0.86;
          if (roads.some((road) => pointNearRoad(x, z, road, roadWidth * 1.15))) continue;
          const w = 4 + rng() * 7;
          const d = 4 + rng() * 7;
          const h = 3 + rng() * (state.mapSize === 'small' ? 10 : 22);
          if (objects.some((b) => Math.abs(b.position.x - x) < (b.size.x + w) * 0.55 && Math.abs(b.position.z - z) < (b.size.z + d) * 0.55)) continue;
          objects.push({
            id: `preview-building-${objects.length}`,
            kind: h > 12 ? 'building' : 'structure',
            category: 'building',
            position: { x, y: h * 0.5, z },
            rotationY: 0,
            size: { x: w, y: h, z: d },
            color: h > 14 ? '#6e7d84' : '#5d6c63',
            boundingRadius: Math.max(w, d) * 0.5
          });
        }
        return {
          seed: state.mapSeed,
          size: state.mapSize,
          halfExtent: half,
          roads,
          surfaces: [],
          trafficRoutes: [],
          trafficSignals: [],
          pedestrianPaths: [],
          objects,
          powerUps: [],
          spawnPoints: [],
          adSurfaces: []
        };
      }

      function pointNearRoad(x, z, road, margin) {
        const sin = Math.sin(road.rotationY ?? 0);
        const cos = Math.cos(road.rotationY ?? 0);
        const localX = (x - road.x) * cos - (z - road.z) * sin;
        const localZ = (x - road.x) * sin + (z - road.z) * cos;
        return Math.abs(localX) < road.width * 0.5 + margin && Math.abs(localZ) < road.length * 0.5;
      }

      function drawMap2d(canvas, map) {
        if (!canvas || !map) return;
        const ctx = canvas.getContext('2d');
        const w = canvas.width;
        const h = canvas.height;
        const half = mapHalf(map);
        const scale = Math.min(w, h) / (half * 2.35);
        const sx = (x) => w * 0.5 + x * scale;
        const sz = (z) => h * 0.5 + z * scale;
        ctx.clearRect(0, 0, w, h);
        ctx.fillStyle = '#253228';
        ctx.fillRect(0, 0, w, h);
        ctx.strokeStyle = '#7f9690';
        ctx.lineWidth = 3;
        ctx.strokeRect(sx(-half), sz(-half), half * 2 * scale, half * 2 * scale);

        for (const road of map.roads ?? []) {
          drawRect2d(ctx, sx, sz, scale, road.x, road.z, road.width, road.length, road.rotationY, '#1e2430');
        }
        for (const surface of map.surfaces ?? []) {
          if (surface.kind === 'crosswalk') {
            drawCrosswalk2d(ctx, sx, sz, scale, surface);
          } else if (surface.kind === 'lane-marking') {
            drawRect2d(ctx, sx, sz, scale, surface.x, surface.z, surface.width, surface.length, surface.rotationY, '#f6f4d7', 0.88);
          } else {
            const color = surface.kind === 'plaza' ? '#66736c' : '#747c77';
            drawRect2d(ctx, sx, sz, scale, surface.x, surface.z, surface.width, surface.length, surface.rotationY, color, 0.95);
          }
        }
        for (const surface of map.adSurfaces ?? []) {
          drawAdSurface2d(ctx, sx, sz, scale, surface);
        }
        for (const object of map.objects ?? []) {
          const size = object.size ?? { x: object.boundingRadius * 2, y: 1, z: object.boundingRadius * 2 };
          const color = object.color || categoryColor(object);
          drawRect2d(ctx, sx, sz, scale, object.position.x, object.position.z, Math.max(0.35, size.x), Math.max(0.35, size.z), object.rotationY ?? 0, color, 0.98);
        }
        for (const powerUp of map.powerUps ?? []) {
          ctx.save();
          ctx.fillStyle = powerUp.color ?? '#5eead4';
          ctx.strokeStyle = '#ffffff';
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.arc(sx(powerUp.position.x), sz(powerUp.position.z), Math.max(3, powerUp.radius * scale), 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();
          ctx.restore();
        }
      }

      function drawMap3d(map) {
        if (!mapPreview) return;
        const group = mapPreview.root;
        group.clear();
        const half = mapHalf(map);
        const ground = new THREE.Mesh(new THREE.BoxGeometry(half * 2, 0.08, half * 2), new THREE.MeshStandardMaterial({ color: '#263228' }));
        ground.position.y = -0.04;
        group.add(ground);
        const roadMaterial = new THREE.MeshStandardMaterial({ color: '#1e2430', roughness: 0.8 });
        for (const road of map.roads ?? []) {
          const mesh = new THREE.Mesh(new THREE.BoxGeometry(road.width, 0.06, road.length), roadMaterial);
          mesh.position.set(road.x, 0.02, road.z);
          mesh.rotation.y = road.rotationY ?? 0;
          group.add(mesh);
        }
        const surfaceMaterials = {
          sidewalk: new THREE.MeshStandardMaterial({ color: '#747c77', roughness: 0.82 }),
          plaza: new THREE.MeshStandardMaterial({ color: '#66736c', roughness: 0.76 }),
          crosswalk: new THREE.MeshStandardMaterial({ color: '#e7edf1', roughness: 0.5 }),
          'lane-marking': new THREE.MeshStandardMaterial({ color: '#f6f4d7', roughness: 0.5 })
        };
        for (const surface of map.surfaces ?? []) {
          const mesh = new THREE.Mesh(
            new THREE.BoxGeometry(surface.width, surface.kind === 'crosswalk' ? 0.08 : 0.055, surface.length),
            surfaceMaterials[surface.kind] ?? surfaceMaterials.sidewalk
          );
          mesh.position.set(surface.x, surface.kind === 'crosswalk' ? 0.08 : 0.055, surface.z);
          mesh.rotation.y = surface.rotationY ?? 0;
          group.add(mesh);
        }
        for (const object of map.objects ?? []) {
          const size = object.size ?? { x: object.boundingRadius * 2, y: 1, z: object.boundingRadius * 2 };
          const material = new THREE.MeshStandardMaterial({ color: object.color || categoryColor(object), roughness: 0.82 });
          const mesh = new THREE.Mesh(new THREE.BoxGeometry(Math.max(0.35, size.x), Math.max(0.18, size.y), Math.max(0.35, size.z)), material);
          mesh.position.set(object.position.x, Math.max(size.y * 0.5, object.position.y ?? size.y * 0.5), object.position.z);
          mesh.rotation.y = object.rotationY ?? 0;
          group.add(mesh);
        }
        for (const powerUp of map.powerUps ?? []) {
          const mesh = new THREE.Mesh(
            new THREE.CylinderGeometry(powerUp.radius, powerUp.radius, 0.16, 28),
            new THREE.MeshStandardMaterial({ color: powerUp.color ?? '#5eead4', emissive: powerUp.color ?? '#5eead4', emissiveIntensity: 0.35 })
          );
          mesh.position.set(powerUp.position.x, 0.18, powerUp.position.z);
          group.add(mesh);
        }
        for (const surface of map.adSurfaces ?? []) {
          const frame = new THREE.Mesh(
            new THREE.BoxGeometry(surface.width, 0.08, Math.max(0.25, surface.height * 0.12)),
            new THREE.MeshStandardMaterial({ color: '#5eead4', emissive: '#0f766e', emissiveIntensity: 0.35 })
          );
          frame.position.set(surface.position.x, Math.max(0.24, surface.position.y), surface.position.z);
          frame.rotation.y = surface.rotationY ?? 0;
          group.add(frame);
        }
        mapPreview.renderOnce();
      }

      function mapHalf(map) {
        return map.halfExtent ?? map.half ?? 78;
      }

      function drawRect2d(ctx, sx, sz, scale, x, z, width, length, rotationY, color, alpha = 1) {
        ctx.save();
        ctx.translate(sx(x), sz(z));
        ctx.rotate(-(rotationY ?? 0));
        ctx.globalAlpha = alpha;
        ctx.fillStyle = color;
        ctx.fillRect(-width * scale * 0.5, -length * scale * 0.5, width * scale, length * scale);
        ctx.restore();
      }

      function drawCrosswalk2d(ctx, sx, sz, scale, surface) {
        const stripeCount = Math.max(4, Math.floor(surface.length / 0.75));
        const stripeLength = surface.length / (stripeCount * 2.1);
        const spacing = surface.length / stripeCount;
        for (let i = 0; i < stripeCount; i += 1) {
          const offset = -surface.length * 0.5 + spacing * (i + 0.5);
          const x = surface.x + Math.sin(surface.rotationY ?? 0) * offset;
          const z = surface.z + Math.cos(surface.rotationY ?? 0) * offset;
          drawRect2d(ctx, sx, sz, scale, x, z, surface.width, stripeLength, surface.rotationY ?? 0, '#e7edf1', 0.96);
        }
      }

      function drawAdSurface2d(ctx, sx, sz, scale, surface) {
        ctx.save();
        ctx.translate(sx(surface.position.x), sz(surface.position.z));
        ctx.rotate(-(surface.rotationY ?? 0));
        ctx.strokeStyle = '#5eead4';
        ctx.lineWidth = 2;
        ctx.strokeRect(-surface.width * scale * 0.5, -Math.max(0.4, surface.height * 0.1) * scale * 0.5, surface.width * scale, Math.max(0.4, surface.height * 0.1) * scale);
        ctx.restore();
      }

      function categoryColor(object) {
        if (object.kind === 'post' || object.kind === 'trafficLight') return '#9aa5a6';
        if (object.category === 'traffic') return '#ef4444';
        if (object.category === 'building') return '#65737a';
        if (object.category === 'pedestrian') return '#e9b872';
        if (object.isAd || object.kind === 'billboard' || object.kind === 'screen') return '#5eead4';
        return '#8fbf8f';
      }

      function createThreePreview(canvas, init, options = {}) {
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
        renderer.setPixelRatio(Math.min(2, window.devicePixelRatio || 1));
        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#07111d');
        const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 800);
        camera.position.set(...(options.cameraPosition ?? [8, 6, 8]));
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 1, 0);
        scene.add(new THREE.HemisphereLight('#dff8ff', '#243028', 2.4));
        const key = new THREE.DirectionalLight('#fff3c4', 2.8);
        key.position.set(6, 9, 4);
        scene.add(key);
        const grid = new THREE.GridHelper(24, 24, '#5eead4', '#33404d');
        scene.add(grid);
        const root = init(scene);
        const resize = () => {
          const rect = canvas.getBoundingClientRect();
          const width = Math.max(1, Math.floor(rect.width));
          const height = Math.max(280, Math.floor(rect.height || 280));
          renderer.setSize(width, height, false);
          camera.aspect = width / height;
          camera.updateProjectionMatrix();
        };
        const renderOnce = () => {
          resize();
          controls.update();
          renderer.render(scene, camera);
        };
        let active = true;
        const loop = () => {
          if (!active) return;
          renderOnce();
          requestAnimationFrame(loop);
        };
        loop();
        return {
          root,
          camera,
          controls,
          renderOnce,
          dispose() {
            active = false;
            controls.dispose();
            renderer.dispose();
          }
        };
      }

      function createPrimitiveObject(kind, data, color, model = {}) {
        const group = new THREE.Group();
        const material = new THREE.MeshStandardMaterial({ color, roughness: 0.74, metalness: 0.05 });
        const lighting = normalizeLighting(model.lighting, kind);
        if (data.shape === 'vehicle') {
          const body = new THREE.Mesh(new THREE.BoxGeometry(data.w, data.h * 0.7, data.d), material);
          body.position.y = data.h * 0.45;
          const cabin = new THREE.Mesh(new THREE.BoxGeometry(data.w * 0.62, data.h * 0.48, data.d * 0.42), new THREE.MeshStandardMaterial({ color: '#a9c5d6' }));
          cabin.position.y = data.h * 0.86;
          cabin.position.z = data.d * 0.02;
          const wheelMaterial = new THREE.MeshStandardMaterial({ color: '#111318', roughness: 0.84, metalness: 0.08 });
          const wheelGeometry = new THREE.CylinderGeometry(Math.max(0.18, data.h * 0.22), Math.max(0.18, data.h * 0.22), 0.18, 16);
          for (const x of [-data.w * 0.52, data.w * 0.52]) {
            for (const z of [-data.d * 0.34, data.d * 0.34]) {
              const wheel = new THREE.Mesh(wheelGeometry, wheelMaterial);
              wheel.rotation.z = Math.PI / 2;
              wheel.position.set(x, data.h * 0.18, z);
              group.add(wheel);
            }
          }
          group.add(body, cabin);
          if (lighting.enabled) {
            const beam = createAdminForwardBeam(lighting.color, Math.max(data.w * 1.8, 3.1), Math.max(data.d * 1.45, 5.8), 0.34 * lighting.intensity);
            beam.position.set(0, 0.035, data.d * 0.72);
            group.add(beam);
            for (const x of [-data.w * 0.28, data.w * 0.28]) {
              const headlight = new THREE.Mesh(
                new THREE.BoxGeometry(0.18, 0.1, 0.05),
                createAdminLightMaterial(lighting.color, 0.9 * lighting.intensity)
              );
              headlight.position.set(x, data.h * 0.36, data.d * 0.52);
              const tail = new THREE.Mesh(
                new THREE.BoxGeometry(0.16, 0.09, 0.05),
                createAdminLightMaterial('#ff4c4c', 0.78)
              );
              tail.position.set(x, data.h * 0.28, -data.d * 0.52);
              group.add(headlight, tail);
            }
          }
        } else if (data.shape === 'tree') {
          const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.16, 0.22, data.h * 0.46, 10), new THREE.MeshStandardMaterial({ color: '#7b5233' }));
          trunk.position.y = data.h * 0.2;
          const crown = new THREE.Mesh(new THREE.DodecahedronGeometry(data.w * 0.62, 0), material);
          crown.position.y = data.h * 0.58;
          group.add(trunk, crown);
        } else if (data.shape === 'post') {
          const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.12, data.h, 10), material);
          pole.position.y = data.h * 0.5;
          const arm = new THREE.Mesh(new THREE.BoxGeometry(1.1, 0.06, 0.08), material);
          arm.position.set(0.55, data.h * 0.82, 0);
          group.add(pole, arm);
          if (lighting.enabled) {
            const bulb = new THREE.Mesh(
              new THREE.SphereGeometry(0.16, 12, 8),
              createAdminLightMaterial(lighting.color, 1.1 * lighting.intensity)
            );
            bulb.position.set(1.08, data.h * 0.78, 0);
            const glow = createAdminRadialGlow(lighting.color, 3.6, 0.46 * lighting.intensity);
            glow.position.set(1.08, 0.025, 0);
            group.add(bulb, glow);
          }
        } else if (data.shape === 'person') {
          const body = new THREE.Mesh(new THREE.CapsuleGeometry(data.w * 0.32, data.h * 0.56, 4, 8), material);
          body.position.y = data.h * 0.5;
          group.add(body);
        } else if (data.shape === 'round') {
          const body = new THREE.Mesh(new THREE.CylinderGeometry(data.w * 0.5, data.w * 0.5, data.h, 24), material);
          body.position.y = data.h * 0.5;
          group.add(body);
        } else if (data.shape === 'building') {
          const body = new THREE.Mesh(new THREE.BoxGeometry(data.w, data.h, data.d), material);
          body.position.y = data.h * 0.5;
          group.add(body);
          if (lighting.enabled) {
            const rows = lighting.windowRows || Math.max(3, Math.min(14, Math.floor(data.h / 1.2)));
            const rowStep = data.h / (rows + 1);
            const lightMaterial = createAdminLightMaterial(lighting.color, Math.min(1, 0.75 * lighting.intensity));
            for (let row = 1; row <= rows; row += 1) {
              const y = rowStep * row;
              for (const z of [-data.d * 0.505, data.d * 0.505]) {
                const strip = new THREE.Mesh(new THREE.BoxGeometry(data.w * 0.62, 0.08, 0.04), lightMaterial);
                strip.position.set(0, y, z);
                group.add(strip);
              }
              if (row % 2 === 1) {
                for (const x of [-data.w * 0.505, data.w * 0.505]) {
                  const strip = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.08, data.d * 0.5), lightMaterial);
                  strip.position.set(x, y, 0);
                  group.add(strip);
                }
              }
            }
          }
        } else if (data.shape === 'ad') {
          const board = new THREE.Mesh(new THREE.BoxGeometry(data.w, data.h, data.d), material);
          board.position.y = data.h * 0.5;
          group.add(board);
        } else {
          const body = new THREE.Mesh(new THREE.BoxGeometry(data.w, data.h, data.d), material);
          body.position.y = data.h * 0.5;
          group.add(body);
        }
        group.userData.kind = kind;
        return group;
      }

      function createAdminLightMaterial(color, opacity) {
        return new THREE.MeshBasicMaterial({
          color,
          transparent: true,
          opacity: Math.max(0, Math.min(1, opacity)),
          depthWrite: false,
          side: THREE.DoubleSide
        });
      }

      function createAdminRadialGlow(color, radius, opacity) {
        const canvas = document.createElement('canvas');
        canvas.width = 192;
        canvas.height = 192;
        const ctx = canvas.getContext('2d');
        const gradient = ctx.createRadialGradient(96, 96, 0, 96, 96, 96);
        gradient.addColorStop(0, 'rgba(255,255,255,0.9)');
        gradient.addColorStop(0.26, 'rgba(255,255,255,0.35)');
        gradient.addColorStop(0.68, 'rgba(255,255,255,0.08)');
        gradient.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, 192, 192);
        const texture = new THREE.CanvasTexture(canvas);
        texture.minFilter = THREE.LinearFilter;
        texture.magFilter = THREE.LinearFilter;
        const mesh = new THREE.Mesh(
          new THREE.PlaneGeometry(radius * 2.4, radius * 1.55),
          new THREE.MeshBasicMaterial({
            color,
            map: texture,
            transparent: true,
            opacity: Math.max(0, Math.min(1, opacity)),
            depthWrite: false,
            side: THREE.DoubleSide
          })
        );
        mesh.rotation.x = -Math.PI / 2;
        return mesh;
      }

      function createAdminForwardBeam(color, width, length, opacity) {
        const shape = new THREE.Shape();
        shape.moveTo(-width * 0.18, 0);
        shape.lineTo(width * 0.18, 0);
        shape.lineTo(width * 0.5, length);
        shape.lineTo(-width * 0.5, length);
        shape.closePath();
        const mesh = new THREE.Mesh(
          new THREE.ShapeGeometry(shape),
          createAdminLightMaterial(color, Math.max(0.06, Math.min(0.9, opacity)))
        );
        mesh.rotation.x = Math.PI / 2;
        return mesh;
      }

      function drawSidePreview(canvas, kind) {
        const ctx = canvas.getContext('2d');
        const selection = currentObjectSelection();
        const data = selection.data;
        const model = selection.model ?? {};
        const spawnOffset = objectSpawnOffset(selection);
        const modelOffset = model.offsetY ?? 0;
        const scale = model.scale ?? 1;
        const centerY = data.h * 0.5 * scale + spawnOffset + modelOffset;
        const bottomY = centerY + data.bottom * scale;
        const topY = centerY + data.top * scale;
        const width = canvas.width;
        const height = canvas.height;
        const unit = Math.min(62, Math.max(18, 200 / Math.max(1, topY - Math.min(-0.5, bottomY))));
        const groundY = Math.round(height * 0.72);
        const toY = (value) => groundY - value * unit;
        ctx.clearRect(0, 0, width, height);
        const bg = ctx.createLinearGradient(0, 0, 0, height);
        bg.addColorStop(0, '#0e1b2b');
        bg.addColorStop(1, '#03070d');
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, width, height);
        ctx.fillStyle = '#172316';
        ctx.fillRect(0, groundY, width, height - groundY);
        ctx.strokeStyle = '#5eead4';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(24, groundY);
        ctx.lineTo(width - 24, groundY);
        ctx.stroke();
        const warning = bottomY < -0.005;
        ctx.setLineDash([8, 8]);
        ctx.strokeStyle = warning ? '#fb7185' : '#91e88c';
        ctx.beginPath();
        ctx.moveTo(34, toY(bottomY));
        ctx.lineTo(width - 34, toY(bottomY));
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle = warning ? 'rgba(251, 113, 133, 0.38)' : 'rgba(94, 234, 212, 0.3)';
        ctx.strokeStyle = warning ? '#fb7185' : '#5eead4';
        const objectWidth = Math.max(28, Math.min(width * 0.62, data.w * unit * scale));
        const objectHeight = Math.max(18, (topY - bottomY) * unit);
        ctx.fillRect(width * 0.5 - objectWidth * 0.5, toY(topY), objectWidth, objectHeight);
        ctx.strokeRect(width * 0.5 - objectWidth * 0.5, toY(topY), objectWidth, objectHeight);
        ctx.fillStyle = '#f8fbff';
        ctx.font = '700 18px Open Sans';
        ctx.fillText(selection.model.label ?? selection.baseKind, 24, 30);
        ctx.font = '14px Open Sans';
        ctx.fillStyle = warning ? '#fb7185' : '#91e88c';
        ctx.fillText(`spawn ${spawnOffset.toFixed(2)}m | model ${modelOffset.toFixed(2)}m | bottom ${bottomY.toFixed(2)}m`, 24, 54);
      }

      function objectSpawnOffset(selection = currentObjectSelection()) {
        return selection.isCustom
          ? finiteOr(selection.model.spawnHeightOffset, 0)
          : finiteOr(state.config.engine.generation.spawnHeightOffsets[selection.baseKind], 0);
      }

      function numberField(label, path, value, min, max, step) {
        return `<label class="field">${label}<input data-path="${path}" type="number" min="${min}" max="${max}" step="${step}" value="${Number(value)}" /></label>`;
      }

      function assetNumberField(label, path, value, min, max, step) {
        return `<label class="field">${label}<input data-asset-path="${path}" type="number" min="${min}" max="${max}" step="${step}" value="${Number(value ?? 0)}" /></label>`;
      }

      function categoryForTextKey(key) {
        return (TEXT_CATEGORIES.find(([id, _label, pattern]) => id !== 'other' && pattern.test(key)) ?? ['other'])[0];
      }

      function objectData(kind) {
        return OBJECT_PREVIEW[kind] ?? OBJECT_PREVIEW.crate;
      }

      function modelPreviewData(kind, model = {}) {
        const base = objectData(kind);
        const width = finiteOr(model.hitbox?.x, base.w);
        const height = finiteOr(model.hitbox?.y, base.h);
        const depth = finiteOr(model.hitbox?.z, base.d);
        return {
          ...base,
          w: width,
          h: height,
          d: depth,
          bottom: -height * 0.5,
          top: height * 0.5,
          color: model.previewColor || base.color
        };
      }

      function languageLabel(lang) {
        const labels = { en: 'English', es: 'Espanol', pt: 'Portugues', fr: 'Francais', de: 'Deutsch', ru: 'Russian', ja: 'Japanese', zh: 'Chinese' };
        return `${lang.toUpperCase()} - ${labels[lang] ?? lang}`;
      }

      function powerupHint(type) {
        return {
          magnet: 'Atrai objetos proximos.',
          shrink: 'Reduz rivais.',
          haste: 'Aumenta velocidade temporaria.',
          shield: 'Protecao temporaria.',
          stamina: 'Recupera stamina.',
          mass: 'Aumenta massa/pontos.',
          gust: 'Sopro que empurra itens.',
          overcharge: 'Stamina infinita por tempo limitado.',
          dash: 'Impulso rapido sem teleporte.'
        }[type] ?? '';
      }

      function eventHint(type) {
        return {
          rain: 'Baixa visibilidade e cidade molhada.',
          thunderstorm: 'Chuva forte e raios.',
          earthquake: 'Pode derrubar objetos e predios.',
          meteorShower: 'Meteoros quentes caem no mapa.',
          sandstorm: 'Tempestade de areia com visibilidade reduzida.'
        }[type] ?? '';
      }

      function setDeep(target, path, value) {
        const parts = path.split('.');
        let cursor = target;
        for (const part of parts.slice(0, -1)) {
          cursor[part] ??= {};
          cursor = cursor[part];
        }
        cursor[parts.at(-1)] = value;
      }

      function getDeep(target, path) {
        return path.split('.').reduce((cursor, part) => cursor?.[part], target);
      }

      function mergeDeep(base, input) {
        if (!isObject(base) || !isObject(input)) return structuredClone(input ?? base);
        const output = structuredClone(base);
        for (const [key, value] of Object.entries(input)) {
          output[key] = isObject(value) && isObject(output[key]) ? mergeDeep(output[key], value) : structuredClone(value);
        }
        return output;
      }

      function isObject(value) {
        return value && typeof value === 'object' && !Array.isArray(value);
      }

      function normalizeAudioPath(value) {
        const trimmed = String(value).trim();
        if (!trimmed) return '';
        if (trimmed.toLowerCase().endsWith('.mp3')) return trimmed.slice(0, -4) + '.ogg';
        if (trimmed.toLowerCase().endsWith('.ogg')) return trimmed;
        return '';
      }

      function finiteOr(value, fallback) {
        const number = Number(value);
        return Number.isFinite(number) ? number : fallback;
      }

      function slugify(value) {
        return String(value ?? '')
          .normalize('NFD')
          .replace(/[\u0300-\u036f]/g, '')
          .replace(/[^a-zA-Z0-9_-]+/g, '_')
          .replace(/^_+|_+$/g, '')
          .toLowerCase() || `custom_${Date.now()}`;
      }

      function seededRandom(seed) {
        let h = 2166136261 >>> 0;
        for (let i = 0; i < seed.length; i += 1) {
          h ^= seed.charCodeAt(i);
          h = Math.imul(h, 16777619);
        }
        return () => {
          h += 0x6D2B79F5;
          let t = h;
          t = Math.imul(t ^ (t >>> 15), t | 1);
          t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
          return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
        };
      }

      function setStatus(message) {
        elements.status.textContent = message;
        window.clearTimeout(statusTimer);
        statusTimer = window.setTimeout(() => {
          elements.status.textContent = '';
        }, 3200);
      }

      function escapeHtml(value) {
        return String(value ?? '').replace(/[&<>"']/g, (char) => ({
          '&': '&amp;',
          '<': '&lt;',
          '>': '&gt;',
          '"': '&quot;',
          "'": '&#039;'
        })[char]);
      }

      function cssEscape(value) {
        return String(value).replace(/["\\]/g, '\\$&');
      }
    </script>
  </body>
</html>
